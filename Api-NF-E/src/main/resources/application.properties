spring.application.name=Api-Recibos
# MongoDB Configuration
spring.data.mongodb.uri=${DATABASE_URL}
spring.data.mongodb.database=lista_de_pdf
spring.data.mongodb.auto-index-creation=true

# Chave exigida no header X-Api-Key para baixar recibos (evita acesso a recibos de terceiros)
api.access.token=${API_ACCESS_TOKEN}

